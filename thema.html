<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>combinvest — Themenseite</title>
<meta name="description" content="Persönliche Analyse je Themenbereich: die passenden Rechner für Ihre Situation.">
<style>
  :root{
    --royal:#3A57F5; --royal-deep:#2C3ED9; --royal-050:#EEF1FF; --royal-100:#DCE3FF;
    --page:#F3F5FC; --surface:#fff; --surface-2:#F6F8FF;
    --ink:#0F1B36; --ink-2:#51607A; --muted:#8A97AC;
    --line:#E4E9F5;
    --radius:18px; --shadow:0 1px 2px rgba(15,27,54,.04),0 10px 30px rgba(46,62,120,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:Manrope,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--surface);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1160px;margin:0 auto;padding:0 22px}

  header{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:8px;padding:12px 0;flex-wrap:wrap}
  .step{display:flex;flex-direction:column;justify-content:center;gap:1px;background:#fff;border:1px solid var(--line);
    border-radius:12px;padding:8px 15px;min-width:120px}
  .step small{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:800}
  .step b{font-size:12.5px;letter-spacing:.07em;text-transform:uppercase;font-weight:800}
  .step.home{border:0;background:transparent;min-width:auto;padding-left:2px}
  .step.home b{color:var(--royal)}
  .step.active{background:var(--royal);border-color:var(--royal)}
  .step.active small{color:#c7d0ff} .step.active b{color:#fff}
  .steps{display:flex;gap:8px;flex-wrap:wrap}
  .nav .spacer{flex:1}
  .lang{font-weight:800;font-size:12px;letter-spacing:.12em;color:var(--ink-2)}
  .brand{display:flex;align-items:center;gap:8px;font-weight:900;font-size:22px;line-height:.72;letter-spacing:-.04em}.brand-mark{display:grid;width:32px;height:36px;place-items:center;clip-path:polygon(50% 0,94% 25%,94% 75%,50% 100%,6% 75%,6% 25%);background:var(--royal);color:#fff;font-size:15px;letter-spacing:0}.brand-word{display:flex;flex-direction:column}
  .brand .b1{color:var(--ink)} .brand .b2{color:var(--royal)}

  .crumb{padding:16px 0 0;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}

  /* hero band */
  .band{background:var(--royal-050);margin-top:14px}
  .band .inner{display:grid;grid-template-columns:1fr 1.25fr;gap:18px;align-items:center;padding:26px 0}
  @media(max-width:820px){.band .inner{grid-template-columns:1fr}}
  .figure{display:flex;justify-content:center}
  .figure svg{width:min(260px,70%);height:auto}
  .slidecard{position:relative;background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:30px 34px;min-height:210px;
    display:flex;flex-direction:column;justify-content:center;overflow:hidden}
  .slidecard .badge{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:9px;background:var(--royal);
    display:flex;align-items:center;justify-content:center}
  .slidecard .badge svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.8}
  .slidecard .kick{color:var(--royal);font-weight:800;font-size:12px;letter-spacing:.16em;text-transform:uppercase}
  .slidecard h2{font-size:clamp(24px,3.4vw,34px);font-weight:900;letter-spacing:-.02em;margin:.3em 0 0;line-height:1.08;max-width:16ch}
  .slidecard ul{margin:.5em 0 0;padding-left:1.1em}
  .slidecard li{font-weight:800;font-size:clamp(17px,2.4vw,22px);line-height:1.35}
  .slide-illu{position:absolute;right:20px;bottom:14px;opacity:.9}
  .chev{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;border:1px solid var(--line);
    background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-2)}
  .chev:hover{border-color:var(--royal);color:var(--royal)}
  .chev.prev{left:-6px} .chev.next{right:-6px}
  .dots{display:flex;gap:6px;justify-content:center;margin-top:12px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--royal-100);cursor:pointer}
  .dot.on{background:var(--royal)}

  /* analysis section */
  main{padding:30px 0 70px}
  h1.sec{font-size:clamp(24px,3.4vw,32px);font-weight:900;letter-spacing:-.02em;margin:0}
  .sub{color:var(--ink-2);font-size:15px;margin:.3em 0 0}
  .tools{display:grid;grid-template-columns:repeat(4,1fr);gap:26px 24px;margin-top:30px}
  @media(max-width:900px){.tools{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.tools{grid-template-columns:1fr}}
  .tool{display:block}
  .tool .ic{width:40px;height:40px;color:var(--royal)}
  .tool .ic svg{width:40px;height:40px;stroke:currentColor;fill:none;stroke-width:1.6}
  .tool h3{font-size:17px;font-weight:900;margin:12px 0 6px;display:flex;align-items:center;gap:8px}
  .tool p{color:var(--ink-2);font-size:13.5px;margin:0;max-width:34ch}
  .tool .go{display:inline-block;margin-top:9px;color:var(--royal);font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase}
  .tool.soon{opacity:.85}
  .tag{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--line);border-radius:999px;padding:2px 8px}
  .tag.live{color:var(--royal);border-color:var(--royal-100);background:var(--royal-050)}
  .tool.live:hover h3{color:var(--royal)}

  .footbar{display:flex;gap:14px;justify-content:center;margin-top:40px;padding-top:26px;border-top:1px solid var(--line)}
  .btn{border-radius:999px;padding:13px 26px;font:inherit;font-weight:800;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;font-size:13px}
  .btn-primary{background:var(--royal);color:#fff;border:0;box-shadow:0 6px 16px rgba(58,87,245,.3)}
  .btn-primary:hover{background:var(--royal-deep)}
  .btn-ghost{background:#fff;color:var(--ink-2);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--royal)}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="step home" href="index.html"><small>Zur</small><b>Startseite</b></a>
    <nav class="steps">
      <a class="step" href="analyse.html"><small>Bereich</small><b id="navBereich">Privatkunde</b></a>
      <span class="step active"><small>Schritt 1</small><b id="navTheme">Thema</b></span>
    </nav>
    <span class="spacer"></span>
    <span class="brand" aria-label="combinvest"><span class="brand-mark" aria-hidden="true">C</span><span class="brand-word"><span class="b1">comb</span><span class="b2">invest</span></span></span>
  </div>
</header>

<div class="wrap crumb" id="crumb">THEMA</div>

<section class="band">
  <div class="wrap inner">
    <div class="figure" id="figure"></div>
    <div class="slidecard" id="slide">
      <div class="badge" id="badge"></div>
      <div class="kick" id="sKick">THEMA</div>
      <div id="sBody"></div>
      <button class="chev prev" id="prev" aria-label="Zurück">‹</button>
      <button class="chev next" id="next" aria-label="Weiter">›</button>
    </div>
  </div>
  <div class="wrap"><div class="dots" id="dots"></div></div>
</section>

<main class="wrap">
  <h1 class="sec">Persönliche Analyse</h1>
  <p class="sub">Ein individueller Blick auf Ihre persönliche Situation.</p>
  <div class="tools" id="tools"></div>

  <div class="footbar">
    <a href="analyse.html"><button class="btn btn-ghost">← Zurück</button></a>
    <a href="analyse.html"><button class="btn btn-primary">Themenfeld abschliessen</button></a>
  </div>
</main>

<script>
(function(){
  "use strict";

  /* --- tiny inline icon set (royal line icons) --- */
  var IC = {
    coins:'<svg viewBox="0 0 24 24"><ellipse cx="8" cy="6" rx="5" ry="2.4"/><path d="M3 6v5c0 1.3 2.2 2.4 5 2.4s5-1.1 5-2.4V6"/><ellipse cx="16" cy="14" rx="5" ry="2.4"/><path d="M11 14v4c0 1.3 2.2 2.4 5 2.4s5-1.1 5-2.4v-4"/></svg>',
    chart:'<svg viewBox="0 0 24 24"><path d="M4 20V4M4 20h16"/><rect x="7" y="12" width="3" height="5"/><rect x="12" y="8" width="3" height="9"/><rect x="17" y="5" width="3" height="12"/></svg>',
    scale:'<svg viewBox="0 0 24 24"><path d="M12 3v18M6 21h12M5 7h14M5 7l-2.5 6a3 3 0 0 0 5 0L5 7zM19 7l-2.5 6a3 3 0 0 0 5 0L19 7z"/></svg>',
    clock:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/></svg>',
    target:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1"/></svg>',
    doc:'<svg viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4M10 13h6M10 17h6"/></svg>',
    calc:'<svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8 7h8M8 11h2M12 11h2M16 11h.01M8 15h2M12 15h2M16 15h2"/></svg>',
    gauge:'<svg viewBox="0 0 24 24"><path d="M4 15a8 8 0 0 1 16 0"/><path d="M12 15l4-3"/><circle cx="12" cy="15" r="1.3"/></svg>',
    home:'<svg viewBox="0 0 24 24"><path d="M4 11l8-6 8 6"/><path d="M6 10v10h12V10"/><path d="M10 20v-6h4v6"/></svg>',
    shield:'<svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 5-3.5 8-7 10-3.5-2-7-5-7-10V6z"/></svg>',
    heart:'<svg viewBox="0 0 24 24"><path d="M12 20s-7-4.5-9-9a4.5 4.5 0 0 1 9-2 4.5 4.5 0 0 1 9 2c-2 4.5-9 9-9 9z"/></svg>',
    tele:'<svg viewBox="0 0 24 24"><path d="M3 14l6 2 2-5-6-2zM9 16l3 5M11 11l7-3-2-4-7 3M16 4l3 2"/></svg>'
  };

  /* --- tool registry (Beschreibungen eigene, knappe Formulierung) --- */
  var TOOLS = {
    budget:      {t:"Budget",         ic:"coins",  d:"Erfassen Sie Einnahmen und Ausgaben — der Geldfluss und Ihre Sparquote auf einen Blick.", href:"budgetrechner.html", live:true},
    sparrechner: {t:"Sparrechner",    ic:"chart",  d:"Sehen Sie, wie sich Ihr Geld über die Zeit entwickelt — in mehreren Szenarien.", href:"vermoegensrechner.html?tool=sparen", live:true},
    zins:        {t:"Zinsvergleich",  ic:"scale",  d:"Vergleichen Sie, welches Endergebnis Sie mit verschiedenen Zinssätzen erreichen.", href:"vermoegensrechner.html?tool=zins", live:true},
    startwarten: {t:"Starten oder Warten", ic:"clock", d:"Welchen Unterschied macht es, sofort statt später mit dem Sparen zu beginnen?", href:"vermoegensrechner.html?tool=start", live:true},
    anleger:     {t:"Anlegerprofil",  ic:"gauge",  d:"Welche Anlageform passt zu Kenntnissen, Risikoneigung und finanzieller Situation?", href:"anlegerprofil.html", live:true},
    rente:       {t:"AHV-Rentenrechner",  ic:"doc",    d:"Schätzen Sie Ihre AHV-Rente mit durchschnittlichem Jahreseinkommen und Rentenskala 44.", href:"rentenrechner.html", live:true},
    vorsorge:    {t:"Vorsorgerechner", ic:"target", d:"Wie viel bis zur Rente ansparen, um später Ihren Wunschbetrag entnehmen zu können?", href:"vorsorgerechner.html", live:true},
    steuer3a:    {t:"Steuereffekte Einzahlung 3a", ic:"calc", d:"Welche Steuerwirkung hat die regelmässige Einzahlung in die Säule 3a?", href:"vermoegensrechner.html?tool=3a", live:true},
    luecke:      {t:"Vorsorgelücke",  ic:"gauge",  d:"Vergleichen Sie AHV-Schätzung und gewünschten Ruhestandsbedarf.", href:"rentenrechner.html", live:true},
    franchise:   {t:"Franchise-Vergleich", ic:"heart", d:"Vergleichen Sie Ihre Grundversicherungsprämie und sehen Sie Ihr Sparpotenzial.", href:"franchise.html", live:true},
    tragbar:     {t:"Wohnrechner — Tragbarkeit", ic:"home", d:"Können Sie sich die Finanzierung Ihrer Wunschimmobilie leisten?", href:"immobilienrechner.html", live:true},
    steuer:      {t:"Steuerwirkung",  ic:"calc",   d:"Schätzen Sie die Wirkung eines frei wählbaren Grenzsteuersatzes.", href:"vermoegensrechner.html?tool=steuer", live:true},
    inflation:   {t:"Inflationsrechner", ic:"chart", d:"Sehen Sie, wie Inflation die künftige Kaufkraft eines Betrags verändert.", href:"vermoegensrechner.html?tool=inflation", live:true},
    kosten:      {t:"Anlagekosten (TER)", ic:"calc", d:"Vergleichen Sie die Vermögensentwicklung vor und nach laufenden Produktkosten.", href:"vermoegensrechner.html?tool=kosten", live:true},
    sparziel:    {t:"Sparzielrechner", ic:"target", d:"Berechnen Sie die monatliche Sparrate für Ihr persönliches Zielvermögen.", href:"vermoegensrechner.html?tool=ziel", live:true}
  };

  /* --- theme config --- */
  var THEMES = {
    "investment": {name:"Vermögen aufbauen", figure:"chart", badge:"coins",
      slides:[{k:"Vermögen aufbauen", h:"Tiefe Zinsen"},{k:"Vermögen aufbauen", h:"Der Zinseszins‑Effekt"}],
      tools:["budget","sparrechner","zins","startwarten","anleger","inflation","kosten","sparziel"]},
    "pensiongap": {name:"Pension vorsorgen", figure:"coins", badge:"tele",
      slides:[{k:"Altersvorsorge", bullets:["Alters­demografie","Sinkende Geburtenraten","Späterer Eintritt ins Berufsleben","Höhere Lebens­erwartung"]}],
      tools:["budget","rente","vorsorge","startwarten","sparrechner","steuer3a"]},
    "property-creation": {name:"Lebensstandard beibehalten", figure:"gauge", badge:"tele",
      slides:[{k:"Lebensstandard beibehalten", h:"Unfälle sehr selten, meistens Krankheit gemäss Statistik"}],
      tools:["budget","luecke","vorsorge","startwarten"]},
    "health": {name:"Gesundheit", figure:"heart", badge:"heart",
      slides:[{k:"Gesundheit", h:"Prämien senken ohne Leistungsverlust"}],
      tools:["franchise","budget","luecke"]},
    "real-estate": {name:"Immobilien", figure:"home", badge:"home",
      slides:[{k:"Immobilien", h:"Mieten oder kaufen?"}],
      tools:["tragbar","budget","startwarten"]},
    "children": {name:"Kinder absichern", figure:"shield", badge:"shield",
      slides:[{k:"Kinder absichern", h:"Früh starten zahlt sich aus"}],
      tools:["budget","sparrechner","vorsorge"]},
    "values-protection": {name:"Versicherungen", figure:"shield", badge:"shield",
      slides:[{k:"Versicherungen", h:"Nur absichern, was wirklich zählt"}],
      tools:["franchise","budget","steuer"]},
    "tax-advantage": {name:"Steuervorteile nutzen", figure:"calc", badge:"calc",
      slides:[{k:"Steuervorteile nutzen", h:"Weniger Steuern, mehr Vorsorge"}],
      tools:["steuer3a","steuer","sparrechner"]}
  };

  function qs(k){return new URLSearchParams(location.search).get(k);}
  var key = qs("t"); if(!THEMES[key]) key="investment";
  var T = THEMES[key];

  document.title = "combinvest — " + T.name;
  document.getElementById("navBereich").textContent = T.name;
  document.getElementById("navTheme").textContent = T.name;
  document.getElementById("crumb").textContent = T.name.toUpperCase();
  document.getElementById("figure").innerHTML =
    '<svg viewBox="0 0 24 24" style="color:var(--royal)">'+ (IC[T.figure]||IC.chart).replace('<svg viewBox="0 0 24 24">','').replace('</svg>','') +'</svg>';
  document.getElementById("figure").firstChild.setAttribute("stroke","#2C3ED9");
  document.getElementById("figure").firstChild.setAttribute("fill","none");
  document.getElementById("figure").firstChild.setAttribute("stroke-width","1.2");
  document.getElementById("badge").innerHTML = IC[T.badge]||IC.tele;

  /* slides / carousel */
  var idx=0;
  function renderSlide(){
    var s=T.slides[idx];
    document.getElementById("sKick").textContent = (s.k||T.name).toUpperCase();
    var body = s.bullets ? "<ul>"+s.bullets.map(function(b){return "<li>"+b+"</li>";}).join("")+"</ul>"
                         : '<h2>'+s.h+'</h2>';
    document.getElementById("sBody").innerHTML = body;
    var dots=document.getElementById("dots"); dots.innerHTML="";
    if(T.slides.length>1){ T.slides.forEach(function(_,i){ var d=document.createElement("span"); d.className="dot"+(i===idx?" on":"");
      d.addEventListener("click",function(){idx=i;renderSlide();}); dots.appendChild(d); }); }
    var show=T.slides.length>1;
    document.getElementById("prev").style.display=show?"flex":"none";
    document.getElementById("next").style.display=show?"flex":"none";
  }
  document.getElementById("prev").addEventListener("click",function(){idx=(idx-1+T.slides.length)%T.slides.length;renderSlide();});
  document.getElementById("next").addEventListener("click",function(){idx=(idx+1)%T.slides.length;renderSlide();});
  renderSlide();

  /* tools */
  var host=document.getElementById("tools"); host.innerHTML="";
  T.tools.forEach(function(id){
    var x=TOOLS[id]; if(!x) return;
    var a=document.createElement("a"); a.className="tool"+(x.live?" live":" soon"); a.href=x.href;
    if(x.href==="#") a.addEventListener("click",function(e){e.preventDefault();});
    a.innerHTML='<div class="ic">'+(IC[x.ic]||IC.calc)+'</div>'+
      '<h3>'+x.t+' '+(x.live?'<span class="tag live">Live</span>':'<span class="tag">In Kürze</span>')+'</h3>'+
      '<p>'+x.d+'</p>'+
      '<span class="go">'+(x.live?"Rechner öffnen →":"Bald verfügbar")+'</span>';
    host.appendChild(a);
  });
})();
</script>
</body>
</html>
