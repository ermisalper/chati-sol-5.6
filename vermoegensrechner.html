:root{--b:#3a57f5;--n:#0f1b36;--m:#6c7890;--l:#e1e7f2;--p:#f4f7fc;--g:#20a568;--o:#ef8b24}*{box-sizing:border-box}body{margin:0;background:var(--p);color:var(--n);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.w{max-width:1140px;margin:auto;padding:0 22px}header{background:#fff;border-bottom:1px solid var(--l)}.nav{height:72px;display:flex;align-items:center;gap:9px}.mark{display:grid;width:34px;height:38px;place-items:center;clip-path:polygon(50% 0,94% 25%,94% 75%,50% 100%,6% 75%,6% 25%);background:var(--b);color:#fff;font-weight:900;font-size:17px;line-height:1}.brand{font-size:23px;font-weight:900;line-height:.72}.brand span{display:block;color:var(--b)}.back{margin-left:auto;color:var(--n);text-decoration:none;font-weight:800}.head{padding:34px 0 18px}.k{color:var(--b);font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase}h1{font-size:clamp(30px,5vw,46px);margin:9px 0;letter-spacing:-.04em}.lead{color:var(--m)}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}.tab{border:1px solid var(--l);background:#fff;border-radius:10px;padding:10px 13px;font:inherit;font-size:12px;font-weight:850;cursor:pointer}.tab.active{background:var(--b);color:#fff}.grid{display:grid;grid-template-columns:380px 1fr;gap:20px}.card{background:#fff;border:1px solid var(--l);border-radius:20px;padding:23px;box-shadow:0 12px 34px rgba(32,53,116,.07)}label{display:block;font-size:13px;font-weight:800;margin:15px 0 6px}.money{display:flex;border:1px solid var(--l);border-radius:9px;overflow:hidden}.money span{padding:11px 0 0 10px;color:var(--m);font-size:12px}.money input{width:100%;border:0;padding:10px;font:inherit;font-weight:750;outline:none}input[type=range]{width:100%;accent-color:var(--b)}.val{float:right;color:var(--b)}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.metric{background:#f6f8fd;border-radius:12px;padding:14px}.metric small{display:block;color:var(--m)}.metric b{font-size:21px}.chart{width:100%;height:300px;margin-top:18px}.chart .gridline{stroke:#e5eaf3}.chart .area{fill:rgba(58,87,245,.12)}.chart .line{fill:none;stroke:var(--b);stroke-width:4}.chart .line2{fill:none;stroke:var(--o);stroke-width:3;stroke-dasharray:8 6}.note{font-size:12px;color:var(--m);margin-top:12px}.warn{background:#fff8e8;padding:12px;border-radius:10px;color:#725b20}.hidden{display:none}@media(max-width:820px){.grid{grid-template-columns:1fr}.metrics{grid-template-columns:1fr}}
</style></head><body><header><div class="w nav"><span class="mark">C</span><strong class="brand">comb<span>invest</span></strong><a class="back" href="thema.html?t=investment">← Themen-Tools</a></div></header><main class="w"><div class="head"><div class="k">Vermögen & Vorsorge</div><h1 id="title">Sparrechner</h1><p class="lead" id="desc"></p></div><div class="tabs" id="tabs"></div><div class="grid"><section class="card" id="form"></section><section class="card"><div class="metrics"><div class="metric"><small id="m1l"></small><b id="m1"></b></div><div class="metric"><small id="m2l"></small><b id="m2"></b></div><div class="metric"><small id="m3l"></small><b id="m3"></b></div></div><svg class="chart" id="chart" viewBox="0 0 700 300" preserveAspectRatio="none"></svg><p class="note" id="note"></p></section></div></main><script>
(function(){"use strict";var modes={sparen:{t:"Spar- und Zinseszinsrechner",d:"Sehen Sie, wie Startkapital, monatliche Sparrate und Rendite Ihr Vermögen entwickeln."},zins:{t:"Zinsvergleich",d:"Vergleichen Sie zwei Renditeannahmen über denselben Anlagehorizont."},start:{t:"Starten oder warten?",d:"Sehen Sie den Preis des Aufschiebens bei gleicher monatlicher Sparrate."},inflation:{t:"Inflationsrechner",d:"Wie viel Kaufkraft bleibt von einem heutigen Betrag in Zukunft?"},kosten:{t:"TER-Kostenrechner",d:"Vergleichen Sie Vermögensentwicklung vor und nach laufenden Produktkosten."},ziel:{t:"Sparzielrechner",d:"Welche monatliche Sparrate führt zu Ihrem Zielvermögen?"},"3a":{t:"Steuereffekt Säule 3a",d:"Schätzen Sie Steuerersparnis und langfristigen Vermögenseffekt Ihrer Einzahlung."},steuer:{t:"Einfacher Steuerabzug",d:"Orientierung: Wirkung eines frei wählbaren Grenzsteuersatzes auf Ihr Einkommen."}};var order=["sparen","zins","start","inflation","kosten","ziel","3a","steuer"],q=new URLSearchParams(location.search).get("tool"),mode=modes[q]?q:"sparen",data={capital:20000,monthly:500,years:25,rate:5,rate2:3,delay:5,inflation:2,ter:.8,target:500000,income:100000,contribution:7258,tax:25};var tabs=document.getElementById("tabs");order.forEach(function(k){var b=document.createElement("button");b.className="tab"+(k===mode?" active":"");b.textContent=modes[k].t;b.onclick=function(){location.search="?tool="+k};tabs.appendChild(b);});function f(n){return "CHF "+Math.round(n).toLocaleString("de-CH");}function fv(cap,mon,yrs,r){var m=r/1200,n=yrs*12;return m?cap*Math.pow(1+m,n)+mon*(Math.pow(1+m,n)-1)/m:cap+mon*n;}function field(id,label,min,max,step){return '<label>'+label+' <span class="val" id="'+id+'v"></span></label><input id="'+id+'" type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+data[id]+'">';}function money(id,label){return '<label>'+label+'</label><div class="money"><span>CHF</span><input id="'+id+'" type="number" min="0" value="'+data[id]+'"></div>';}function build(){title.textContent=modes[mode].t;desc.textContent=modes[mode].d;var h="";if(mode!=="inflation"&&mode!=="3a"&&mode!=="steuer")h+=money("capital","Startkapital");if(["sparen","zins","start","kosten"].includes(mode))h+=money("monthly","Monatliche Sparrate");if(mode==="ziel")h+=money("target","Zielvermögen");if(mode==="inflation")h+=money("capital","Heutiger Betrag");if(mode==="3a"){h+=money("contribution","Einzahlung Säule 3a / Jahr")+field("tax","Grenzsteuersatz",5,45,1)+field("years","Anlagehorizont",1,40,1);}else if(mode==="steuer"){h+=money("income","Bruttoeinkommen / Jahr")+field("tax","Angenommener Grenzsteuersatz",5,45,1);}else{h+=field("years","Laufzeit",1,45,1);if(mode!=="inflation")h+=field("rate","Rendite p.a.",0,10,.1);if(mode==="zins")h+=field("rate2","Vergleichsrendite",0,10,.1);if(mode==="start")h+=field("delay","Später starten nach",1,15,1);if(mode==="inflation")h+=field("inflation","Inflation p.a.",0,6,.1);if(mode==="kosten")h+=field("ter","Produktkosten (TER)",0,3,.1);}form.innerHTML=h;form.querySelectorAll("input").forEach(function(x){x.oninput=function(){data[x.id]=+x.value;calc();};});calc();}
function calc(){var a=0,b=0,c=0,series=[],series2=[];if(mode==="inflation"){a=data.capital;b=data.capital/Math.pow(1+data.inflation/100,data.years);c=a-b;}else if(mode==="ziel"){var m=data.rate/1200,n=data.years*12,capgrow=data.capital*Math.pow(1+m,n);a=data.target;b=Math.max(0,(a-capgrow)*m/(Math.pow(1+m,n)-1));c=data.capital+b*n;}else if(mode==="3a"){a=data.contribution*data.tax/100;b=fv(0,data.contribution/12,data.years,4);c=data.contribution*data.years;}else if(mode==="steuer"){a=data.income*data.tax/100;b=data.income-a;c=data.tax;}else{a=fv(data.capital,data.monthly,data.years,data.rate);b=data.capital+data.monthly*12*data.years;if(mode==="zins")c=fv(data.capital,data.monthly,data.years,data.rate2);else if(mode==="start")c=fv(data.capital,data.monthly,Math.max(0,data.years-data.delay),data.rate);else if(mode==="kosten")c=fv(data.capital,data.monthly,data.years,Math.max(0,data.rate-data.ter));else c=a-b;}var labels={inflation:["Heute","Kaufkraft danach","Kaufkraftverlust"],ziel:["Zielvermögen","Nötige Sparrate / Monat","Einzahlungen"],"3a":["Steuerersparnis / Jahr","Vermögen bei 4 %","Einzahlungen"],steuer:["Geschätzte Abgabenwirkung","Nach Abzug","Grenzsteuersatz"],zins:["Endwert Rendite 1","Einzahlungen","Endwert Rendite 2"],start:["Sofort starten","Einzahlungen","Später starten"],kosten:["Vor Kosten","Einzahlungen","Nach TER"],sparen:["Endvermögen","Einzahlungen","Ertrag"]}[mode];[m1l,m2l,m3l].forEach(function(e,i){e.textContent=labels[i];});m1.textContent=f(a);m2.textContent=f(b);m3.textContent=mode==="steuer"?Math.round(c)+" %":f(c);var yrs=mode==="steuer"?1:data.years,max=1;for(var y=0;y<=yrs;y++){var v=mode==="inflation"?data.capital/Math.pow(1+data.inflation/100,y):fv(data.capital,data.monthly||0,y,data.rate||0),v2=mode==="zins"?fv(data.capital,data.monthly,y,data.rate2):mode==="start"?fv(data.capital,data.monthly,Math.max(0,y-data.delay),data.rate):mode==="kosten"?fv(data.capital,data.monthly,y,Math.max(0,data.rate-data.ter)):0;series.push(v);series2.push(v2);max=Math.max(max,v,v2);}draw(series,series2,max);note.textContent="Planungsmodell ohne Garantie. Renditen, Inflation, Steuersatz und Kosten sind Annahmen; Gebühren, Steuern und Marktschwankungen können abweichen.";document.querySelectorAll("input").forEach(function(x){var o=document.getElementById(x.id+"v");if(o)o.textContent=x.id==="years"||x.id==="delay"?x.value+" Jahre":x.value+" %";});}function draw(s,s2,max){chart.innerHTML='<line class="gridline" x1="30" y1="250" x2="680" y2="250"/><line class="gridline" x1="30" y1="40" x2="30" y2="250"/>';function pts(a){return a.map(function(v,i){return (30+i/(a.length-1||1)*650)+","+(250-v/max*205)}).join(" ");}chart.innerHTML+='<polyline class="line" points="'+pts(s)+'"/>'+(s2.some(Boolean)?'<polyline class="line2" points="'+pts(s2)+'"/>':'');}build();})();
</script><script src="assets/combinvest-secure.js"></script><script src="wealth-chart.js"></script></body></html>
